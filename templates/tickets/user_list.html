{% extends "base.html" %}

{% block content %}
<div class="jumbotron">
    <div class="container">
        <h1>My Tickets</h1>
    </div>
</div>

<div class="container">
    <div class="row mb-3">
        <div class="col-md-8">
            <div class="btn-group" role="group">
                <button class="btn btn-sm btn-outline-secondary filter-btn active" data-filter="all">All</button>
                <button class="btn btn-sm btn-outline-success filter-btn" data-filter="open">Open</button>
                <button class="btn btn-sm btn-outline-warning filter-btn" data-filter="in_progress">In Progress</button>
                <button class="btn btn-sm btn-outline-danger filter-btn" data-filter="closed">Closed</button>
            </div>
        </div>
        <div class="col-md-4 text-right">
            <a href="/tickets/new" class="btn btn-sm btn-success">
                <i class="fas fa-plus"></i> New Ticket
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12" id="tickets-container">
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener("DOMContentLoaded", function(){
    var nonce = init.csrfNonce;
    var container = document.getElementById("tickets-container");

    function escHtml(s){
        var d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
    }

    function statusBadge(s){
        if(s === "open") return '<span class="badge badge-success">Open</span>';
        if(s === "in_progress") return '<span class="badge badge-warning">In Progress</span>';
        return '<span class="badge badge-danger">Closed</span>';
    }

    function renderCard(t){
        var scopeBadge = t.scope === "team"
            ? '<span class="badge badge-info"><i class="fas fa-users"></i> Team</span>'
            : '<span class="badge badge-secondary"><i class="fas fa-user"></i> Personal</span>';

        return '<div class="card mb-2 ticket-card" data-status="' + t.status + '">'
            + '<div class="card-body py-3 px-3">'
            + '<div class="d-flex justify-content-between align-items-center">'
            + '<div><a href="/tickets/' + t.id + '" class="font-weight-bold">' + escHtml(t.title) + '</a>'
            + ' <span class="ml-2">' + scopeBadge + ' <span class="badge badge-light">' + escHtml(t.category) + '</span></span></div>'
            + '<div>' + statusBadge(t.status)
            + ' <small class="text-muted ml-2">' + (t.updated_at ? new Date(t.updated_at).toLocaleString() : '') + '</small></div>'
            + '</div></div></div>';
    }

    function getActiveFilter(){ return document.querySelector(".filter-btn.active").dataset.filter; }

    function applyFilters(){
        var f = getActiveFilter();
        container.querySelectorAll(".ticket-card").forEach(function(card){
            card.style.display = (f === "all" || card.dataset.status === f) ? "" : "none";
        });
    }

    document.querySelectorAll(".filter-btn").forEach(function(btn){
        btn.addEventListener("click", function(){
            document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
            btn.classList.add("active");
            applyFilters();
        });
    });

    function fetchAndRender(){
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "/api/tickets");
        xhr.setRequestHeader("CSRF-Token", nonce);
        xhr.onload = function(){
            if(xhr.status !== 200) return;
            var resp = JSON.parse(xhr.responseText);
            if(!resp.success) return;
            if(resp.data.length === 0){
                container.innerHTML = '<div class="text-center text-muted py-5">'
                    + '<i class="fas fa-ticket-alt fa-3x mb-3 d-block"></i>'
                    + 'No tickets yet. Create one if you need help!</div>';
            } else {
                var html = "";
                resp.data.forEach(function(t){ html += renderCard(t); });
                container.innerHTML = html;
            }
            applyFilters();
        };
        xhr.send();
    }

    fetchAndRender();
    setInterval(fetchAndRender, 5000);
});
</script>
{% endblock %}
